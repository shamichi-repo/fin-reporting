apiVersion: asset.sap/v1
kind: Asset

metadata:
  name: cost-center-intelligence-agent
  version: "1.0.0"
  description: "AI agent that enables Finance Controllers to query SAP S/4HANA cost center data via natural language"

type: agent

container:
  buildPath: .
  port: 5000

requires:
  - name: CE_COSTCENTER_0001_MCP
    kind: mcp-server
    ordId: sap.s4:apiResource:CE_COSTCENTER_0001_MCP:v2

probes:
  startup:
    path: /.well-known/agent.json
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 18
  liveness:
    path: /.well-known/agent.json
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /.well-known/agent.json
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
